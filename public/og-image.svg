<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <radialGradient id="heroGlow" cx="35%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#1f6feb" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cardGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#79c0ff"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.2" fill="#58a6ff" opacity="0.14"/>
    </pattern>
    <pattern id="board" width="48" height="48" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#58a6ff" opacity="0.04"/>
      <rect x="24" y="24" width="24" height="24" fill="#58a6ff" opacity="0.04"/>
    </pattern>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cardClip">
      <rect x="620" y="95" width="500" height="440" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1117"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="780" y="-40" width="520" height="520" fill="url(#board)" transform="rotate(12 1040 220)"/>
  <rect width="1200" height="630" fill="url(#heroGlow)"/>

  <!-- Decorative accent lines -->
  <line x1="0" y1="580" x2="180" y2="580" stroke="#58a6ff" stroke-width="3" opacity="0.25" stroke-linecap="round"/>
  <circle cx="1100" cy="80" r="120" fill="#58a6ff" opacity="0.04"/>
  <circle cx="80" cy="520" r="80" fill="#1f6feb" opacity="0.06"/>

  <!-- Left: branding -->
  <g transform="translate(72 0)">
    <!-- Knight icon -->
    <g transform="translate(0 118) scale(3.2)" filter="url(#softGlow)">
      <ellipse cx="16" cy="26" rx="9" ry="2" fill="#58a6ff" opacity="0.25"/>
      <path fill="#58a6ff" d="M10 24.5h12c.55 0 1-.45 1-1v-.5c0-.55-.45-1-1-1h-1.2c.45-.55.7-1.25.7-2 0-1.65-1.35-3-3-3-.35 0-.7.06-1 .17C16.4 15.2 15.5 14 14 14c-1.65 0-3 1.35-3 3 0 .75.28 1.45.75 2-.95.45-1.55 1.4-1.55 2.5 0 1.5 1.2 2.7 2.7 2.7h.1z"/>
      <path fill="#79c0ff" d="M14.5 8.5c0-1.1.9-2 2-2s2 .9 2 2c0 .45-.15.85-.4 1.2.85.35 1.4 1.15 1.4 2.1 0 1.25-1 2.25-2.25 2.25h-1.5C14.5 12.05 13.5 11.05 13.5 9.8c0-.95.55-1.75 1.4-2.1-.25-.35-.4-.75-.4-1.2z"/>
      <circle cx="19.5" cy="10.5" r=".9" fill="#0d1117"/>
    </g>

    <text x="0" y="290" fill="url(#titleGrad)" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="700" letter-spacing="-2">Chess</text>
    <text x="0" y="380" fill="#c9d1d9" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="700" letter-spacing="-2">Analyzer</text>

    <text x="0" y="440" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500">Deep stats from real Chess.com games</text>

    <!-- Feature pills -->
    <g font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="600">
      <rect x="0" y="475" width="118" height="36" rx="18" fill="#58a6ff" opacity="0.12" stroke="#58a6ff" stroke-opacity="0.35"/>
      <text x="59" y="499" text-anchor="middle" fill="#79c0ff">Openings</text>
      <rect x="130" y="475" width="118" height="36" rx="18" fill="#58a6ff" opacity="0.12" stroke="#58a6ff" stroke-opacity="0.35"/>
      <text x="189" y="499" text-anchor="middle" fill="#79c0ff">Matchups</text>
      <rect x="260" y="475" width="118" height="36" rx="18" fill="#58a6ff" opacity="0.12" stroke="#58a6ff" stroke-opacity="0.35"/>
      <text x="319" y="499" text-anchor="middle" fill="#79c0ff">Win Plans</text>
      <rect x="390" y="475" width="118" height="36" rx="18" fill="#58a6ff" opacity="0.12" stroke="#58a6ff" stroke-opacity="0.35"/>
      <text x="449" y="499" text-anchor="middle" fill="#79c0ff">Playstyle</text>
    </g>

    <rect x="0" y="545" width="220" height="5" rx="2.5" fill="url(#btnGrad)" opacity="0.7"/>
  </g>

  <!-- Right: dashboard mockup -->
  <g clip-path="url(#cardClip)">
    <rect x="620" y="95" width="500" height="440" rx="20" fill="#141a24" stroke="#58a6ff" stroke-opacity="0.22" stroke-width="1.5"/>
    <rect x="620" y="95" width="500" height="440" rx="20" fill="url(#cardGlow)"/>

    <!-- Card header -->
    <circle cx="660" cy="138" r="22" fill="#1f2937" stroke="#58a6ff" stroke-opacity="0.4" stroke-width="2"/>
    <text x="660" y="145" text-anchor="middle" fill="#58a6ff" font-family="Georgia, serif" font-size="22" font-weight="700">N</text>
    <text x="694" y="133" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="22" font-weight="700">NatureBanana</text>
    <text x="694" y="156" fill="#4a5568" font-family="system-ui, sans-serif" font-size="14">847 games &#183; last 6 months</text>

    <!-- Win rate ring -->
    <circle cx="820" cy="250" r="58" fill="none" stroke="#1f2937" stroke-width="10"/>
    <circle cx="820" cy="250" r="58" fill="none" stroke="#3fb950" stroke-width="10" stroke-dasharray="264 365" stroke-linecap="round" transform="rotate(-90 820 250)"/>
    <text x="820" y="246" text-anchor="middle" fill="#3fb950" font-family="Georgia, serif" font-size="28" font-weight="700">58%</text>
    <text x="820" y="268" text-anchor="middle" fill="#4a5568" font-family="system-ui, sans-serif" font-size="12">win rate</text>

    <!-- Form dots -->
    <g transform="translate(900 218)">
      <text x="0" y="0" fill="#8b949e" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Recent form</text>
      <rect x="0" y="12" width="14" height="14" rx="3" fill="#3fb950"/>
      <rect x="20" y="12" width="14" height="14" rx="3" fill="#3fb950"/>
      <rect x="40" y="12" width="14" height="14" rx="3" fill="#f85149"/>
      <rect x="60" y="12" width="14" height="14" rx="3" fill="#3fb950"/>
      <rect x="80" y="12" width="14" height="14" rx="3" fill="#6e7681"/>
      <rect x="100" y="12" width="14" height="14" rx="3" fill="#3fb950"/>
    </g>

    <!-- Openings bar chart -->
    <text x="650" y="340" fill="#8b949e" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Top openings</text>
    <g transform="translate(650 355)">
      <text x="0" y="14" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="14">Italian Game</text>
      <rect x="130" y="2" width="180" height="14" rx="4" fill="#1f2937"/>
      <rect x="130" y="2" width="142" height="14" rx="4" fill="#58a6ff"/>
      <text x="320" y="14" fill="#3fb950" font-family="system-ui, sans-serif" font-size="13" font-weight="700">62%</text>

      <text x="0" y="44" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="14">Sicilian</text>
      <rect x="130" y="32" width="180" height="14" rx="4" fill="#1f2937"/>
      <rect x="130" y="32" width="108" height="14" rx="4" fill="#58a6ff" opacity="0.75"/>
      <text x="320" y="44" fill="#3fb950" font-family="system-ui, sans-serif" font-size="13" font-weight="700">54%</text>

      <text x="0" y="74" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="14">London System</text>
      <rect x="130" y="62" width="180" height="14" rx="4" fill="#1f2937"/>
      <rect x="130" y="62" width="86" height="14" rx="4" fill="#58a6ff" opacity="0.55"/>
      <text x="320" y="74" fill="#f85149" font-family="system-ui, sans-serif" font-size="13" font-weight="700">41%</text>
    </g>

    <!-- Mini compare strip -->
    <rect x="650" y="455" width="440" height="58" rx="12" fill="#0d1117" stroke="#58a6ff" stroke-opacity="0.15"/>
    <text x="670" y="482" fill="#f97316" font-family="system-ui, sans-serif" font-size="15" font-weight="700">You</text>
    <text x="720" y="482" fill="#4a5568" font-family="system-ui, sans-serif" font-size="15">vs</text>
    <text x="748" y="482" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Opponent</text>
    <rect x="870" y="468" width="90" height="32" rx="8" fill="url(#btnGrad)"/>
    <text x="915" y="490" text-anchor="middle" fill="#0d1117" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Analyze</text>

    <!-- Floating chess pieces -->
    <text x="1040" y="420" fill="#58a6ff" font-family="serif" font-size="48" opacity="0.15">&#9818;</text>
    <text x="1060" y="170" fill="#79c0ff" font-family="serif" font-size="36" opacity="0.12">&#9814;</text>
  </g>
</svg>
